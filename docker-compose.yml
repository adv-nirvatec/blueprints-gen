services:
  blueprints-app:
    container_name: blueprints-app
    build: .
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3012
      - HOSTNAME=0.0.0.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
